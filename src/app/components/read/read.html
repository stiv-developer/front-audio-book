<div class="min-h-screen bg-gray-200 py-6 md:py-12 flex flex-col items-center gap-6 md:gap-10" >
  @for (pageContent of pages(); track $index) {
    <!-- <div [id]="'hoja-' + $index" [class.ring-2]="currentIdx() === $index && isReading" class="relative group w-full flex justify-center px-4 md:px-0" > -->
    <div [id]="'hoja-' + $index" class="relative group w-full flex justify-center px-4 md:px-0" >

      <div class="w-full max-w-[794px] bg-white dark:bg-[#0f172a] shadow-xl border border-gray-300 
                  p-6 sm:p-12 md:p-[80px] min-h-0 md:min-h-[1123px] flex flex-col transition-all">
        
        <div class="flex gap-2 justify-end items-center mb-4 md:mb-0">
          <span class="text-gray-400 font-mono text-sm">Pág. {{ $index + 1 }}</span>
          <button 
            (click)="toggleLecturaHoja($index)"
            class="p-2 md:p-1 rounded-full shadow-lg border border-gray-200 dark:border-slate-700 text-gray-500 hover:text-blue-600 transition-all active:scale-95 z-10"
            title="Escuchar esta página">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.287a6 6 0 010 7.426M4.5 12.067v-1.5a.75.75 0 01.75-.75h2.25l3.33-3.33a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-3.33-3.33H5.25a.75.75 0 01-.75-.75v-1.5z" />
            </svg>
          </button>
        </div>

        <article class="prose prose-slate prose-sm sm:prose-base lg:prose-lg max-w-none flex-grow overflow-x-hidden">
          <markdown [data]="pageContent"></markdown>
        </article>
        
        <div class="mt-8 border-t pt-4 text-center text-gray-300 text-[10px] md:text-xs uppercase tracking-widest">
          Documento ERP - Confidencial
        </div>
      </div>
    </div>
  }
  
  @if (pages().length === 0) {
    <div class="text-gray-500 animate-pulse">Cargando documento...</div>
  }
</div>

<footer class="fixed bottom-0 left-0 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-t border-gray-200 dark:border-slate-700 p-4 z-20">
  <div class="max-w-4xl mx-auto flex flex-row items-center justify-between gap-6">
    
    <div class="flex items-center gap-2">
      <span class="text-sm font-mono text-gray-500 dark:text-slate-400 min-w-[80px] text-center">
        Pág. {{ currentIdx() + 1 }} / {{ pages().length }}
      </span>
    </div>

    <div class="flex items-center gap-4 flex-grow justify-center">

      <button (click)="cambiarPagina(-1)">
        <svg [lucideIcon]="IconPrev" class="w-6 h-6 text-indigo-600"></svg>
      </button>
      <button (click)="reproducirGlobal()" class="flex items-center gap-2 p-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full shadow-md transition-all active:scale-95">
        @if (isReading()) {
          <svg [lucideIcon]="IconPause" class="w-6 h-6"></svg>
        } @else {
          <svg [lucideIcon]="IconPlay" class="w-6 h-6"></svg>
        }
      </button>
      <button (click)="cambiarPagina(1)">
        <svg [lucideIcon]="IconNext" class="w-6 h-6 text-indigo-600"></svg>
      </button>
      <!-- <button>
        <svg [lucideIcon]="IconRotate" class="w-6 h-6 text-indigo-600"></svg>
      </button> -->
      
    </div>

    <div class="relative flex items-center">
      <button (click)="toggleDropdown()">
        <svg [lucideIcon]="IconCog" class="w-8 h-8 text-indigo-600"></svg>
      </button>

      @if (isDropdownOpen()) {
        <div class="absolute bottom-full right-0 mb-2 w-[280px] bg-white border border-slate-100 rounded-xl shadow-2xl z-50 overflow-hidden animate-in fade-in zoom-in-95 origin-bottom duration-200">
          <div class="p-1.5">
            <ul class="flex flex-col gap-1">
              <li class="flex justify-between px-3 py-2 hover:bg-slate-50 rounded-lg cursor-pointer">
                <span class="text-sm text-slate-700">Velocidad de Reproducción</span>
                <span class="text-sm font-medium text-indigo-600">1.0x</span>
              </li>
              <li class="flex items-center justify-between px-3 py-2.5 hover:bg-slate-50 rounded-lg transition-colors">
                <span class="text-sm font-medium text-slate-700">Modo Oscuro</span>

                <label class="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" class="sr-only peer" (change)="toggleTheme()">
                  <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-indigo-300 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                </label>
              </li>
            </ul>
          </div>
        </div>
      }
    </div>

    <!-- <div class="flex flex-col items-center gap-2">
      <select [(ngModel)]="playbackRate" class="bg-transparent text-sm font-bold text-indigo-600 focus:outline-none cursor-pointer">
        <option [value]="0.75">0.75x</option>
        <option [value]="1">1.0x</option>
        <option [value]="1.25">1.25x</option>
        <option [value]="1.5">1.5x</option>
        <option [value]="2">2x</option>
      </select>
      <span class="hidden md:block text-xs text-gray-400 uppercase font-bold">Velocidad</span>
    </div> -->

  </div>
</footer>
