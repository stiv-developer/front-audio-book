@if(isSidebarOpen) {
    <div (click)="toggleSidebar()" class="fixed inset-0 z-20 bg-slate-900/60 backdrop-blur-sm lg:hidden transition-opacity"></div>
}

<aside [class.translate-x-0]="isSidebarOpen" 
       [class.-translate-x-full]="!isSidebarOpen"
       class="fixed inset-y-0 left-0 z-30 w-72 md:w-[380px] h-screen flex flex-col bg-slate-950 border-r border-slate-800/60 transition-all duration-300 ease-in-out transform static translate-x-0">
    
    <div class="flex-none flex items-center justify-between px-6 py-8">
        <div class="flex items-center gap-3">
            <span class="text-xl font-bold text-white tracking-tight">Audio<span class="text-indigo-500">Book</span></span>
        </div>
        <button (click)="toggleSidebar()" class="p-2 rounded-lg text-slate-400 hover:bg-slate-800 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <nav class="flex-1 px-4 overflow-y-auto space-y-1 custom-scrollbar">
    
        <p class="px-4 text-[10px] font-semibold text-slate-500 uppercase tracking-[2px] mb-4">
            Contenido del Libro
        </p>

        <ul class="space-y-1">
            @for (item of libroService.indice(); track $index) {
                <li>
                    <button 
                        (click)="navegar(item.pagina)"
                        [style.padding-left.rem]="item.nivel * 0.75"
                        [class.text-indigo-400]="libroService.paginaActual() === item.pagina"
                        [class.bg-slate-800]="libroService.paginaActual() === item.pagina"
                        class="w-full flex items-center px-4 py-2 text-sm text-slate-400 rounded-lg hover:bg-slate-800/40 hover:text-slate-100 transition-all text-left">
                        
                        @if (item.nivel === 1) {
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                        }
                        
                        <span class="truncate">{{ item.texto }}</span>
                    </button>
                </li>
            }
        </ul>
    </nav>
</aside>
