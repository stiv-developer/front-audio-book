<header class="fixed top-0 left-0 w-full z-50 flex justify-end p-4 pointer-events-none">
  <button 
    (click)="toggleDarkMode()" 
    class="pointer-events-auto p-2 rounded-full bg-white dark:bg-slate-800 shadow-lg border border-gray-200 dark:border-slate-700 hover:scale-110 transition-all active:scale-95"
    title="Cambiar tema">
    
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-500 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 18v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707zM12 5a7 7 0 100 14 7 7 0 000-14z" />
    </svg>

    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-700 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
    </svg>
  </button>
</header>

<div class="min-h-screen bg-gray-200 py-6 md:py-12 flex flex-col items-center gap-6 md:gap-10" >
  @for (pageContent of pages(); track $index) {
    <div [id]="'hoja-' + $index" [class.ring-2]="currentIdx() === $index && isReading" 
    class="relative group w-full flex justify-center px-4 md:px-0" >

      <div class="w-full max-w-[794px] bg-white dark:bg-[#0f172a] shadow-xl border border-gray-300 
                  p-6 sm:p-12 md:p-[80px] min-h-0 md:min-h-[1123px] flex flex-col transition-all">
        
        <div class="flex gap-2 justify-end items-center mb-4 md:mb-0">
          <span class="text-gray-400 font-mono text-sm">Pág. {{ $index + 1 }}</span>
          <button 
            (click)="toggleLecturaHoja($index)"
            class="p-2 md:p-1 rounded-full shadow-lg border border-gray-200 dark:border-slate-700 text-gray-500 hover:text-blue-600 transition-all active:scale-95 z-10"
            title="Escuchar esta página">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.287a6 6 0 010 7.426M4.5 12.067v-1.5a.75.75 0 01.75-.75h2.25l3.33-3.33a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-3.33-3.33H5.25a.75.75 0 01-.75-.75v-1.5z" />
            </svg>
          </button>
        </div>

        <article class="prose prose-slate prose-sm sm:prose-base lg:prose-lg max-w-none flex-grow overflow-x-hidden">
          <markdown [data]="pageContent"></markdown>
        </article>
        
        <div class="mt-8 border-t pt-4 text-center text-gray-300 text-[10px] md:text-xs uppercase tracking-widest">
          Documento ERP - Confidencial
        </div>
      </div>
    </div>
  }
  
  @if (pages().length === 0) {
    <div class="text-gray-500 animate-pulse">Cargando documento...</div>
  }
</div>

<footer class="fixed bottom-0 left-0 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-t border-gray-200 dark:border-slate-700 p-4 z-50">
  <div class="max-w-4xl mx-auto flex flex-row items-center justify-between gap-6">
    
    <div class="flex items-center gap-2">
      <span class="text-sm font-mono text-gray-500 dark:text-slate-400 min-w-[80px] text-center">
        Pág. {{ currentIdx() + 1 }} / {{ pages().length }}
      </span>
    </div>

    <div class="flex items-center gap-4 flex-grow justify-center">

      <button (click)="cambiarPagina(-1)">
        <svg [lucideIcon]="IconPrev" class="w-6 h-6 text-blue-600"></svg>
      </button>
      <button (click)="reproducirGlobal()" class="flex items-center gap-2 p-2 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-md transition-all active:scale-95">
        @if (isReading()) {
        <!-- @if (isReading()) { -->
          <svg [lucideIcon]="IconPause" class="w-6 h-6"></svg>
        } @else {
          <svg [lucideIcon]="IconPlay" class="w-6 h-6"></svg>
        }
      </button>
      <button (click)="cambiarPagina(1)">
        <svg [lucideIcon]="IconNext" class="w-6 h-6 text-blue-600"></svg>
      </button>
      <button>
        <svg [lucideIcon]="IconRotate" class="w-6 h-6 text-blue-600"></svg>
      </button>

      
    </div>

    <div class="flex flex-col items-center gap-2">
      <select [(ngModel)]="playbackRate" class="bg-transparent text-sm font-bold text-blue-600 focus:outline-none cursor-pointer">
        <option [value]="0.75">0.75x</option>
        <option [value]="1">1.0x</option>
        <option [value]="1.25">1.25x</option>
        <option [value]="1.5">1.5x</option>
        <option [value]="2">2x</option>
      </select>
      <span class="hidden md:block text-xs text-gray-400 uppercase font-bold">Velocidad</span>
    </div>

  </div>
</footer>

<div class="h-24"></div>
